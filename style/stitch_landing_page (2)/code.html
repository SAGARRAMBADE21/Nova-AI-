<html lang="en"><head>

              orange: '#FF5925',

              grayBody: '#666666',

              borderGray: '#E5E7EB',

          borderRadius: {

            'card': '24px',

      }
    }
  </script>
<style data-purpose="custom-styling">
    body {
      background-color: #FFFFFF;
      color: #666666;
    }
    .input-focus-ring:focus {
      outline: none;
      border-color: #1A1A1A;

    /* Abstract Ribbon Decorations */

      right: -100px;
      width: 400px;

      background: linear-gradient(135deg, #FF5925 0%, #FFB347 100%);
      filter: blur(80px);
      opacity: 0.15;
      border-radius: 50%;
      z-index: -1;
    }

      width: 500px;

      background: linear-gradient(135deg, #FFB347 0%, #FF5925 100%);

      opacity: 0.1;
      border-radius: 50%;
      z-index: -1;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col font-sans overflow-x-hidden">
<!-- BEGIN: Navigation -->
<nav class="sticky top-0 z-50 h-16 bg-white/92 backdrop-blur-md border-b border-brand-borderGray flex items-center px-6 lg:px-12 justify-between">
<div class="flex items-center gap-2">
<a class="text-brand-charcoal font-bold text-xl tracking-tight" href="index.html">QueryMind</a>
</div>
<div class="hidden md:flex items-center gap-8">
<a class="text-sm font-medium text-brand-grayBody hover:text-brand-charcoal transition-colors" href="#features">Features</a>
<a class="text-sm font-medium text-brand-grayBody hover:text-brand-charcoal transition-colors" href="#how-it-works">How It Works</a>
<a class="text-sm font-medium text-brand-grayBody hover:text-brand-charcoal transition-colors" href="#security">Security</a>
<a class="text-sm font-medium text-brand-grayBody hover:text-brand-charcoal transition-colors" href="#pricing">Pricing</a>
</div>
<div>
<a class="bg-brand-charcoal text-white px-5 py-2 rounded-pill text-sm font-semibold hover:opacity-90 transition-all" href="onboard.html">
        Create Workspace
      </a>
</div>
</nav>
<!-- END: Navigation -->
<!-- BEGIN: Main Content -->
<main class="flex-grow flex items-center justify-center px-4 py-12 relative">
<!-- Decorative Ribbons -->
<div class="ribbon-top-right"></div>
<div class="ribbon-bottom-left"></div>
<!-- BEGIN: Login Card -->
<div class="w-full max-w-[480px] bg-brand-lightGray border border-brand-borderGray rounded-card p-8 md:p-10 shadow-[0_2px_16px_rgba(0,0,0,0.06)] relative z-10" data-purpose="login-card">
<!-- Header -->
<div class="text-center mb-10">
<h1 class="text-3xl md:text-4xl font-bold text-brand-charcoal mb-3">Sign In to QueryMind</h1>
<p class="text-brand-grayBody">Enter your company credentials to continue</p>
</div>
<!-- Form -->
<form class="space-y-6" id="loginForm">
<!-- Company Join Code -->
<div data-purpose="form-group">
<label class="block text-[13px] font-semibold text-brand-charcoal mb-1.5" for="join_code">Company Join Code</label>
<input class="w-full px-4 py-3 bg-white border border-brand-borderGray rounded-[12px] text-brand-charcoal placeholder-brand-placeholder focus:border-brand-charcoal focus:ring-1 focus:ring-brand-charcoal transition-all uppercase" id="join_code" name="join_code" oninput="this.value = this.value.toUpperCase()" placeholder="e.g. ACMEXK7P12" required="" type="text"/>
<p class="mt-1.5 text-xs text-gray-400">Find this in your invite email or from your admin</p>
</div>
<!-- Email Address -->
<div data-purpose="form-group">
<label class="block text-[13px] font-semibold text-brand-charcoal mb-1.5" for="email">Email Address</label>
<input class="w-full px-4 py-3 bg-white border border-brand-borderGray rounded-[12px] text-brand-charcoal placeholder-brand-placeholder focus:border-brand-charcoal focus:ring-1 focus:ring-brand-charcoal transition-all" id="email" name="email" placeholder="your@company.com" required="" type="email"/>
</div>
<!-- Password -->
<div data-purpose="form-group">
<label class="block text-[13px] font-semibold text-brand-charcoal mb-1.5" for="password">Password</label>
<div class="relative">
<input class="w-full px-4 py-3 bg-white border border-brand-borderGray rounded-[12px] text-brand-charcoal placeholder-brand-placeholder focus:border-brand-charcoal focus:ring-1 focus:ring-brand-charcoal transition-all" id="password" name="password" placeholder="Your password" required="" type="password"/>
<button aria-label="Toggle password visibility" class="absolute right-3 top-1/2 -translate-y-1/2 text-brand-placeholder hover:text-brand-charcoal transition-colors" id="togglePassword" type="button">
<!-- Eye Icon -->
<svg class="lucide lucide-eye" fill="none" height="20" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0z"></path><circle cx="12" cy="12" r="3"></circle></svg>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center justify-between">
<div class="flex items-center">
<input class="h-4 w-4 text-brand-orange border-brand-borderGray rounded focus:ring-brand-orange" id="remember" type="checkbox"/>
<label class="ml-2 block text-sm text-brand-grayBody" for="remember">
              Remember me
            </label>
</div>
</div>
<!-- Submit Button -->
<button class="w-full bg-brand-charcoal text-white py-3.5 rounded-pill font-semibold text-base hover:opacity-95 transition-all flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed" id="signInBtn" type="submit">
<span id="btnText">Sign In</span>
<div class="hidden animate-spin h-5 w-5 border-2 border-white border-t-transparent rounded-full" id="btnLoader"></div>
</button>
<!-- Error Container -->
<div class="hidden text-center text-sm text-red-600 bg-red-50 p-3 rounded-lg border border-red-100" id="errorMessage">
<!-- Error message text injected here -->
</div>
</form>
<!-- Footer Links -->
<div class="mt-8 pt-6 border-t border-brand-borderGray flex flex-col gap-3 text-center">
<p class="text-sm">
          First time? 
          <a class="text-brand-orange font-semibold hover:text-brand-hoverOrange transition-colors ml-1" href="register.html">Register your account →</a>
</p>
<p class="text-sm">
          New company? 
          <a class="text-brand-orange font-semibold hover:text-brand-hoverOrange transition-colors ml-1" href="onboard.html">Create a workspace →</a>
</p>
</div>
</div>
<!-- END: Login Card -->
</main>
<!-- END: Main Content -->
<!-- BEGIN: Footer -->
<footer class="py-8 px-6 border-t border-brand-borderGray bg-white text-center">
<p class="text-sm text-brand-placeholder">© 2025 QueryMind. All rights reserved.</p>
</footer>
<!-- END: Footer -->
<script data-purpose="login-logic">
    const loginForm = document.getElementById('loginForm');
    const signInBtn = document.getElementById('signInBtn');
    const btnText = document.getElementById('btnText');
    const btnLoader = document.getElementById('btnLoader');
    const errorMsg = document.getElementById('errorMessage');
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');

    // Toggle Password Visibility
    togglePassword.addEventListener('click', () => {
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
    });

    // Form Submission
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      // UI Reset
      errorMsg.classList.add('hidden');
      signInBtn.disabled = true;
      btnText.textContent = 'Verifying...';
      btnLoader.classList.remove('hidden');

      const formData = new FormData(loginForm);
      const payload = Object.fromEntries(formData.entries());

      try {
        // Simulated API Call: POST http://localhost:8000/join
        const response = await fetch('http://localhost:8000/join', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (response.ok) {
          // Store session data
          localStorage.setItem("nova_token", data.token);
          localStorage.setItem("nova_role", data.role);
          localStorage.setItem("nova_company", data.company_name);

          // Success feedback
          btnText.textContent = 'Success!';
          btnLoader.classList.add('hidden');

          // Redirect based on role
          setTimeout(() => {
            if (data.role === 'admin') {
              window.location.href = 'dashboard.html';
            } else {
              window.location.href = 'chat.html';
            }
          }, 800);
        } else {
          throw new Error(data.message || 'Authentication failed');
        }
      } catch (err) {
        // Error handling
        btnLoader.classList.add('hidden');
        btnText.textContent = 'Sign In';
        signInBtn.disabled = false;
        
        errorMsg.classList.remove('hidden');
        
        // Specific error messages mapping based on requirements
        if (err.message.includes('404')) {
          errorMsg.textContent = "Invalid join code. Check with your admin.";
        } else if (err.message.includes('403')) {
          errorMsg.innerHTML = 'Account not set up yet — <a href="register.html" class="underline">Register your account first →</a>';
        } else if (err.message.includes('401')) {
          errorMsg.textContent = "Incorrect password. Please try again.";
        } else {
          errorMsg.textContent = "Invalid credentials or join code — please try again.";
        }
      }
    });
  </script>
</body></html>
